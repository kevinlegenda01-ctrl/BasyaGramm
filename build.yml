name: Build BasyaGramm APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Download Gradle Wrapper JAR
        run: |
          mkdir -p gradle/wrapper
          curl -L "https://github.com/gradle/gradle/raw/v8.4.0/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar || \
          wget "https://services.gradle.org/distributions/gradle-8.4-wrapper.jar" \
            -O gradle/wrapper/gradle-wrapper.jar || true
          
          # Если не скачалось — используем gradle напрямую
          if [ ! -s gradle/wrapper/gradle-wrapper.jar ]; then
            echo "Downloading via gradle directly"
            gradle wrapper --gradle-version=8.4 || true
          fi

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace --no-daemon

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: BasyaGramm-DEBUG
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Show APK info
        run: |
          echo "=== APK готов! ==="
          ls -lh app/build/outputs/apk/debug/ || echo "Debug APK not found"
